<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>보결 배정 시스템</title>
  <meta name="description" content="초등학교 보결 배정 관리 시스템 — 교사 시간표 기반 자동 추천"/>
  <meta name="author" content="최창훈 2026"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#F7F8FA}
    #root{min-height:100vh}
    /* 로딩 스피너 */
    #loading{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#F7F8FA;z-index:9999;gap:16px;
    }
    #loading .spinner{
      width:44px;height:44px;border:4px solid #DDE1EA;
      border-top-color:#3B5FCC;border-radius:50%;
      animation:spin .8s linear infinite;
    }
    #loading p{font-size:14px;color:#6B7280;font-weight:500}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>보결 배정 시스템을 불러오는 중...</p>
  </div>
  <div id="root"></div>
